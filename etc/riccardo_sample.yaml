# Kanon di Gemini (AGC) Configuration File
#
# Copy this file to ~/.agc.yaml to override the default hardcoded workspaces
# and configure surfaces explicitly!
# Repo: github.com/palladius/agc
folders:
  - path: "~/git/gemini-cli-palladius-private-goodies"
    comment: "Private research and tools"
    visibility: ["gc", "agy"]
    context: "global"

  - path: "~/git/gemini-cli-palladius-public-goodies"
    comment: "Publicly shared skills"
    visibility: ["gc", "agy"]
    context: "global"

  - path: "~/git/gemini-cli-custom-commands"
    comment: "Standard custom command skills"
    visibility: ["gc", "agy"]
    context: "global"
